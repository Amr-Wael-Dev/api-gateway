services:
  users-service:
    build:
      context: ../..
      target: dev
      args:
        SERVICE_PATH: services/users
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://admin:password@mongo:27017/users-db?authSource=admin
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    networks:
      - backend
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/services/users/src
        - action: rebuild
          path: ./package.json
