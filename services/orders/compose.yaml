services:
  orders-service:
    build:
      context: ../..
      target: dev
      args:
        SERVICE_PATH: services/orders
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://admin:password@mongo:27017/orders-db?authSource=admin
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/services/orders/src
        - action: rebuild
          path: ./package.json
