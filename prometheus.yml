global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:3000"]
  - job_name: "auth-service"
    metrics_path: "/auth/metrics"
    static_configs:
      - targets: ["gateway:3000"]
  - job_name: "users-service"
    metrics_path: "/users/metrics"
    static_configs:
      - targets: ["gateway:3000"]
